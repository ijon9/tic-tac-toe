<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1 style="text-align:center"> Tic Tac Toe</h1>
    <div id="board">
        <div id="0-0" onclick="game.makeMove(0,0)"></div>
        <div id="0-1" onclick="game.makeMove(0,1)"></div>
        <div id="0-2" onclick="game.makeMove(0,2)"></div>
        <div id="1-0" onclick="game.makeMove(1,0)"></div>
        <div id="1-1" onclick="game.makeMove(1,1)"></div>
        <div id="1-2" onclick="game.makeMove(1,2)"></div>
        <div id="2-0" onclick="game.makeMove(2,0)"></div>
        <div id="2-1" onclick="game.makeMove(2,1)"></div>
        <div id="2-2" onclick="game.makeMove(2,2)"></div>
    </div>
    <div id="message"></div>
</body>
</html>
